name: 每日籌碼推播雷達

on:
  schedule:
    - cron: '0 8 * * 1-5' # 台灣時間下午 16:00 執行
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    
    - name: 設定 Python 環境
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
        
    - name: 安裝所需套件
      run: |
        python -m pip install --upgrade pip
        pip install requests pandas
        
    - name: 執行抓取與 Telegram 推播腳本
      env:
        TG_TOKEN: ${{ secrets.TG_TOKEN }}      # 注入 Telegram Bot Token
        TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}  # 注入接收者的 Chat ID
      run: python twse_api_fetcher.py
