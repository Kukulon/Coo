name: 測試 Telegram 推播

on:
  workflow_dispatch:

jobs:
  test_telegram_bot:
    runs-on: ubuntu-latest
    
    steps:
    - name: 下載程式碼 (非常重要，將 Repo 檔案抓進虛擬機)
      uses: actions/checkout@v4
      
    - name: 列出檔案檢查 (Debug 專用)
      run: ls -la
    
    - name: 設定 Python 3.10 環境
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        
    - name: 安裝所需套件
      run: |
        python -m pip install --upgrade pip
        pip install requests
        
    - name: 執行發送訊息腳本
      env:
        TG_TOKEN: ${{ secrets.TG_TOKEN }}
        TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
      run: python tgmsg.py

